# For more information: https://laravel.com/docs/sail
services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            DATAMINING_URL: 'http://datamining:8001'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: 'w9cafe-pos:latest'
        profiles:
            - prod
        environment:
            APP_ENV: '${APP_ENV:-production}'
            APP_DEBUG: '${APP_DEBUG:-false}'
            APP_URL: '${APP_URL:-http://localhost:8080}'
            DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
            DB_HOST: 'pgsql'
            DB_PORT: '${DB_PORT:-5432}'
            DB_DATABASE: '${DB_DATABASE:-pos_cafe}'
            DB_USERNAME: '${DB_USERNAME:-postgres}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'
            REDIS_HOST: 'redis'
            REDIS_PORT: '${REDIS_PORT:-6379}'
            REDIS_PASSWORD: '${REDIS_PASSWORD:-null}'
            WWWUSER: '${WWWUSER:-1000}'
            WWWGROUP: '${WWWGROUP:-1000}'
            DATAMINING_URL: 'http://datamining:8001'
        volumes:
            - '.:/var/www/html'
            - 'storage-data:/var/www/html/storage/app/public'
        ports:
            - '${PROD_APP_PORT:-8081}:80'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
            datamining:
                condition: service_started
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/"]
    datamining:
        build:
            context: ./datamining
            dockerfile: Dockerfile
        image: 'w9cafe-datamining:latest'
        profiles:
            - prod
        environment:
            DB_HOST: 'pgsql'
            DB_PORT: '${DB_PORT:-5432}'
            DB_NAME: '${DB_DATABASE:-cafe}'
            DB_USER: '${DB_USERNAME:-sail}'
            DB_PASSWORD: '${DB_PASSWORD:-password}'
        ports:
            - '${DATAMINING_PORT:-8001}:8001'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
            interval: 10s
            retries: 5
            start_period: 30s
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    storage-data:
        driver: local
